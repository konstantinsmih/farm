<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Subtle Pine Pattern Background */
        .pine-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='100' viewBox='0 0 60 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 10 L45 40 L15 40 Z M30 30 L50 70 L10 70 Z M28 70 L32 70 L32 85 L28 85 Z' fill='%2310b981'/%3E%3C/svg%3E");
            background-repeat: repeat;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .glass-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (hover: hover) {
            .glass-card:hover {
                background: rgba(16, 185, 129, 0.04);
                border-color: rgba(16, 185, 129, 0.4);
                transform: translateY(-2px);
                box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            }
        }

        .active-tap:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Subtle animation for the background */
        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 60px 100px; }
        }
        
        .animated-bg {
            animation: drift 60s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-emerald-500/30">

    <!-- Background Layer -->
    <div class="pine-background animated-bg"></div>

    <main class="w-full max-w-xl mx-auto px-6 pt-16 pb-12 flex flex-col items-center relative z-10">
        <!-- Minimalist Pine Icon -->
        <div class="mb-10 text-emerald-500 drop-shadow-[0_0_15px_rgba(16,185,129,0.3)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 3-8 8h16l-8-8Z"/>
                <path d="m12 7-10 10h20l-10-10Z"/>
                <path d="M12 17v4"/>
            </svg>
        </div>

        <header class="text-center mb-12">
            <h1 class="text-4xl font-light tracking-tight text-white mb-2">Farm Project</h1>
        </header>

        <nav class="w-full space-y-4">
            <!-- Farm S -->
            <a href="farm_s.html" class="glass-card active-tap flex items-center justify-between p-6 rounded-3xl group">
                <div class="flex items-center space-x-5">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-emerald-500 ring-1 ring-emerald-500/20 group-hover:ring-emerald-500/50 transition-all">
                        <span class="text-lg font-semibold">S</span>
                    </div>
                    <div>
                        <h2 class="text-base font-medium text-zinc-200">Farm S</h2>
                    </div>
                </div>
                <div class="w-8 h-8 rounded-full flex items-center justify-center bg-zinc-900/50 text-zinc-600 group-hover:text-emerald-500 group-hover:bg-emerald-500/10 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </a>

            <!-- Farm A -->
            <a href="farm_a.html" class="glass-card active-tap flex items-center justify-between p-6 rounded-3xl group">
                <div class="flex items-center space-x-5">
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-400 ring-1 ring-blue-500/20 group-hover:ring-blue-400/50 transition-all">
                        <span class="text-lg font-semibold">A</span>
                    </div>
                    <div>
                        <h2 class="text-base font-medium text-zinc-200">Farm A</h2>
                    </div>
                </div>
                <div class="w-8 h-8 rounded-full flex items-center justify-center bg-zinc-900/50 text-zinc-600 group-hover:text-blue-400 group-hover:bg-blue-500/10 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
            </a>
        </nav>
    </main>

    <footer class="p-8 text-center relative z-10">
        <div class="inline-block px-4 py-1 rounded-full bg-zinc-900/50 border border-zinc-800/50 backdrop-blur-sm">
            <p class="text-[9px] uppercase tracking-[0.3em] text-zinc-500 font-medium">
                Managed Forestry System &copy; 2026
            </p>
        </div>
    </footer>

</body>
</html>
