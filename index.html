<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #e5e5e5;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            transition: all 0.2s ease-in-out;
        }

        @media (hover: hover) {
            .glass-card:hover {
                background: rgba(255, 255, 255, 0.06);
                border-color: #10b981;
                transform: translateY(-2px);
            }
        }

        .active-tap:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between selection:bg-emerald-500/30">

    <main class="w-full max-w-xl mx-auto px-6 pt-16 pb-12 flex flex-col items-center">
        <!-- Minimalist Pine Icon -->
        <div class="mb-10 text-emerald-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 3-8 8h16l-8-8Z"/><path d="m12 7-10 10h20l-10-10Z"/><path d="M12 17v4"/>
            </svg>
        </div>

        <header class="text-center mb-12">
            <h1 class="text-3xl font-medium tracking-tight text-white mb-3">Farm Project</h1>
        </header>

        <nav class="w-full space-y-4">
            <!-- Farm S -->
            <a href="farm_s.html" class="glass-card active-tap flex items-center justify-between p-5 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-500">
                        <span class="text-sm font-semibold">S</span>
                    </div>
                    <div>
                        <h2 class="text-base font-medium text-zinc-200">Farm S</h2>
                    </div>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-600 group-hover:text-emerald-500 transition-colors" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                </svg>
            </a>

            <!-- Farm A -->
            <a href="farm_a.html" class="glass-card active-tap flex items-center justify-between p-5 rounded-2xl group">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400">
                        <span class="text-sm font-semibold">A</span>
                    </div>
                    <div>
                        <h2 class="text-base font-medium text-zinc-200">Farm A</h2>
                    </div>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-zinc-600 group-hover:text-blue-400 transition-colors" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                </svg>
            </a>
        </nav>
    </main>

    <footer class="p-8 text-center">
        <p class="text-[10px] uppercase tracking-[0.2em] text-zinc-700 font-medium">
            Managed Forestry System &copy; 2024
        </p>
    </footer>

</body>
</html>
